# Butterfly 主题配置
favicon: /img/favicon.png

avatar:
  img: /img/avatar.png
  effect: false

index_format: 3
pagination_style: 2

post_meta:
  page:
    date_type: both
    date_format: YYYY-MM-DD
    categories: true
    tag: true
  post:
    date_type: both
    date_format: YYYY-MM-DD
    categories: true
    tag: true

post_copyright:
  enable: false

scrollbar:
  enable: true
  type: default

highlight_theme: mac light
highlight_copy: true
highlight_lang: true
highlight_shrink: false
code_word_wrap: true

default_top_img: linear-gradient(135deg, #667eea 0%, #764ba2 100%)
archive_top_img: linear-gradient(135deg, #667eea 0%, #764ba2 100%)
tag_top_img: linear-gradient(135deg, #667eea 0%, #764ba2 100%)
category_top_img: linear-gradient(135deg, #667eea 0%, #764ba2 100%)

# 文章底部分享按钮（仅微信、QQ）
share:
  use: sharejs

footer:
  owner:
    enable: true
    since: 2025
  copyright: true
  custom_text: <a href="https://july-x.github.io">Powered By AI.</a><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4951549986720325" crossorigin="anonymous"/>

busuanzi:
  site_uv: false
  site_pv: false
  page_pv: false

# dark mode
darkmode:
  enable: true
  # dark mode和 light mode切换按钮
  button: true
  autoChangeMode: false
  # Set the light mode time. The value is between 0 and 24. If not set, the default value is 6 and 18
  start: # 8
  end: # 22

# Mermaid
# https://github.com/mermaid-js/mermaid
mermaid:
  enable: true
  code_write: false
  theme:
    light: default
    dark: dark
  open_in_new_tab: true
  zoom_pan: true

local_search:
  enable: false

canvas_ribbon:
  enable: true
  size: 150
  alpha: 0.6
  zIndex: -1
  click_change_move: true
  mobile: false

# canvas_fluttering_ribbon:
#   enable: true
#   mobile: false # false 手機端不顯示 true 手機端顯示

# 點擊出現愛心
click_heart:
  enable: true
  mobile: false

preloader:
  enable: true

aside:
  enable: true
  position: right
  card_author:
    enable: true
    button:
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/July-X
  card_announcement:
    enable: true
    content: "🎮 Game Dev · ⚡ AI · 🔧 Tech Explorer"
  card_recent_post:
    enable: true
    limit: 5
    sort: updated
  card_categories:
    enable: true
    limit: 10
  card_tags:
    enable: true
    limit: 20
  card_archives:
    enable: true
    type: monthly
    format: YYYY-MM
    order: -1
    limit: 8
  card_webinfo:
    enable: true
    post_count: true
    last_push_date_sort: first
code_blocks:
  # Code block theme: darker / pale night / light / ocean / false
  theme: pale night
  macStyle: false
  # Code block height limit (unit: px)
  height_limit: false
  word_wrap: false

  # Toolbar
  copy: true
  language: true
  # true: shrink the code blocks | false: expand the code blocks | none: expand code blocks and hide the button
  shrink: false
  fullpage: false

disable_top_img: true
background: https://i.loli.net/2019/09/09/5oDRkWVKctx2b6A.png

navbar:
  logo_img: /img/logo.png
  menu:
    首页: / || fas fa-home
    归档: /archives/ || fas fa-archive
    标签: /tags/ || fas fa-tags
    分类: /categories/ || fas fa-folder-open
    关于: /about/ || fas fa-user

nav:
  # Navigation bar logo image
  logo: /img/logo.png
  display_title: true
  display_post_title: true
  # Whether to fix navigation bar
  fixed: true

google_adsense:
  enable: true
  auto_ads: true
  js: https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js
  client: ca-pub-4951549986720325
  enable_page_level_ads: false


